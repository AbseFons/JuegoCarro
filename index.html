<!DOCTYPE html>
<html lang="es">

<head>

    <title>Juego de Carreras</title>

    <script src="juego.js"></script>
    <script src="terminado.js"></script>
    <script src="principal.js"></script>

    <style>
        body {
            margin: 0;

            background-color: #2c3e50;
            font-family: Arial, sans-serif;
